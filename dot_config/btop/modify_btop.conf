{{- /* chezmoi:modify-template */ -}}
{{- .chezmoi.stdin
    | replaceAllRegex "vim_keys\\s*=\\s*.*" "vim_keys = true"
    | replaceAllRegex "rounded_corners\\s*=\\s*.*" "rounded_corners = false"
    | replaceAllRegex "color_theme\\s*=\\s*.*" "color_theme = \"/usr/share/btop/themes/greyscale.theme\"" 
 }}
